<!-- Smart App Banner estilo iOS para Android (iOS ya lo da nativo vía <meta apple-itunes-app>).
     Banner FIJO (no rebota en el overscroll) + spacer en flujo que reserva su alto; el
     scroll-away se hace con transform en scroll. Se muestra vía JS solo en Android. -->
<div class="ios-banner" id="app-banner" role="complementary" aria-label="Descargar la app de MEWI">
  <img class="ios-banner-icon" src="/brand/icono-web.webp" alt="" width="52" height="52" decoding="async">
  <div class="ios-banner-text">
    <strong class="ios-banner-name">Mewi</strong>
    <span class="ios-banner-sub">Acumula, Canjea, Disfruta.</span>
  </div>
  <button type="button" class="ios-banner-action" id="app-banner-open"
    aria-label="Obtener MEWI para Android">Obtener</button>
  <button type="button" class="ios-banner-close" id="app-banner-close" aria-label="Cerrar">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3.2"
      stroke-linecap="round" aria-hidden="true">
      <line x1="5" y1="5" x2="19" y2="19" />
      <line x1="19" y1="5" x2="5" y2="19" />
    </svg>
  </button>
</div>
<div class="ios-banner-spacer" aria-hidden="true"></div>

<script>
  (function () {
    // ponytail: UA-sniff — no existe API para "¿es Android?"; regex es el estándar de facto.
    if (!/Android/i.test(navigator.userAgent)) return;
    // Persistente: una vez cerrado no vuelve a mostrarse (ni al recargar/volver).
    try { if (localStorage.getItem('mewi-android-banner-dismissed') === '1') return; } catch (e) {}

    var html = document.documentElement;
    var banner = document.getElementById('app-banner');
    if (!banner) return;
    // Corre durante el parse del body, ANTES de <nav> → el offset CSS aplica antes de que la nav pinte.
    html.classList.add('has-app-banner');
    // Reserva (alto del spacer) fija; el banner es fixed y no ocupa flujo.
    html.style.setProperty('--app-banner-reserve', banner.offsetHeight + 'px');

    // Banner fijo: el scroll-away se hace con transform (sube al scrollear). La nav se
    // sienta bajo la parte visible del banner vía --app-banner-h. Ambos clampeados a
    // [0, alto] para que el overscroll (scrollY negativo) NO los mueva → banner pegado arriba.
    var ticking = false;
    function sync() {
      ticking = false;
      var bh = banner.offsetHeight;
      var h = Math.max(0, Math.min(bh, bh - (window.scrollY || 0)));
      html.style.setProperty('--app-banner-h', h + 'px');
      banner.style.transform = 'translateY(' + (h - bh) + 'px)';
    }
    function onScroll() { if (!ticking) { ticking = true; requestAnimationFrame(sync); } }
    sync();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', sync, { passive: true });

    document.getElementById('app-banner-close').addEventListener('click', function () {
      try { localStorage.setItem('mewi-android-banner-dismissed', '1'); } catch (e) {}
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', sync);
      // Cierre animado: banner sube (slide-up + fade), spacer colapsa (contenido ocupa su
      // lugar) y nav sube a su top natural. Todo por CSS bajo .is-closing.
      html.classList.add('is-closing');
      banner.style.transform = '';                          // deja que la clase controle el slide-up
      html.style.setProperty('--app-banner-reserve', '0px'); // spacer → 0 (contenido sube)
      html.style.setProperty('--app-banner-h', '0px');       // nav → top natural
      banner.addEventListener('transitionend', function te(e) {
        if (e.propertyName !== 'transform') return;
        banner.removeEventListener('transitionend', te);
        html.classList.remove('has-app-banner', 'is-closing'); // banner → display:none, nav natural
        html.style.removeProperty('--app-banner-reserve');
        html.style.removeProperty('--app-banner-h');
      });
    });

    // ── "Obtener" / "Abrir" ─────────────────────────────────────────────────
    // Scaffold: si la app ya está instalada, el botón dice "Abrir" y la lanza.
    // Degrada solo → mientras falte la infra, siempre muestra "Obtener".
    // PARA ACTIVARLO cuando la app esté publicada, agregar 3 cosas:
    //   1. Web App Manifest enlazado con related_applications:
    //        [{ "platform": "play", "id": "com.mewi.app",
    //           "url": "https://play.google.com/store/apps/details?id=com.mewi.app" }]
    //   2. /.well-known/assetlinks.json en el dominio con el fingerprint SHA-256
    //      de la firma del APK (Digital Asset Links verifica sitio↔app).
    //   3. Rellenar DEEP_LINK abajo con el esquema/URL que abre la app.
    var DEEP_LINK = ''; // p.ej. 'mewi://home' o 'https://mewi.mx/app' (link que captura la app)
    var installed = false;
    var openBtn = document.getElementById('app-banner-open');

    if (navigator.getInstalledRelatedApps) {
      navigator.getInstalledRelatedApps().then(function (apps) {
        if (apps && apps.length) {
          installed = true;
          openBtn.textContent = 'Abrir';
          openBtn.setAttribute('aria-label', 'Abrir MEWI');
        }
      }).catch(function () { /* sin manifest/assetlinks: se queda en "Obtener" */ });
    }

    openBtn.addEventListener('click', function () {
      if (installed && DEEP_LINK) { window.location.href = DEEP_LINK; return; }
      // Fallback: flujo de descarga Android existente (modal APK del CTA).
      var trigger = document.getElementById('apk-open');
      if (trigger) trigger.click();
    });
  })();
</script>
